adversarial:
  docx/decompression-bomb.docx:
    sha256: dc023ed151fb4eb0d17143f082e2fcbc7efaa9d99f5273360a12dd68c770afa1
    size: 5631
    expected: ResourceExhaustedError
    provenance: synthesized — 5 MiB of one byte inside a minimal docx zip
    notes: |
      Expands ~5000:1; trips the default Limits.max_decompression_ratio=100
      cap inside DocxExtractor._guard_zip BEFORE any XML parser sees the
      payload. If this ever stops raising, the ratio guard is broken.
  docx/zip-slip.docx:
    sha256: c7e2909dc14725ced673641915323ebee97f99c408174131ca6132188383d898
    size: 382
    expected: CorruptDocumentError
    provenance: synthesized — minimal docx zip with a '../../../etc/passwd-fake' entry
    notes: |
      Tests the zip-slip path-traversal guard in DocxExtractor._guard_zip.
      Even though we never extract to disk, refusing these names defends
      downstream consumers that might.
  html/billion-laughs.html:
    sha256: 815da3bcdadc7d33ce8d81854d65667cd8f24893667bc28336aa1c05606e95da
    size: 334
    expected: sanitized
    provenance: synthesized — classic XML billion-laughs payload wrapped in HTML
    notes: |
      selectolax (lexbor backend) is an HTML5 parser, not XML. It ignores
      `<!ENTITY>` declarations entirely; the payload's entity references
      remain as literal `&lol4;` text. If we ever swap to an XML-strict
      parser, this fixture will start either expanding the payload (FAIL)
      or raising — both detectable by the golden runner.
  pdf/encrypted.pdf:
    sha256: 39b6b524954ef9bbb104fd0ccc56d347211bd3cc771106a2f82664cadf278f90
    size: 1353
    expected: EncryptedDocumentError
    provenance: synthesized — AES-256 encrypted, owner+user passwords set
    notes: |
      Verifies the extractor refuses to silently bypass encryption with a
      blank password. Some downstream APIs auto-try '' — knovas-extract
      MUST NOT.
  rtf/object-linking.rtf:
    sha256: 47b9929fbcf09537bd123faab22d1e6acb90f231427517e0e8716933d17da830
    size: 191
    expected: warning
    provenance: synthesized — RTF with \object\objemb\objclass Excel.Sheet (CVE-2017-0199-class)
    notes: |
      striprtf has no OLE loader; the payload bytes are silently dropped.
      Our extractor emits a 'RTF contains OLE object-linking control words'
      warning so callers can audit hostile inputs. If the warning ever
      stops firing we've lost the audit signal even though no execution
      occurred.
